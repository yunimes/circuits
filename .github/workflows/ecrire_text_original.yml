# Changer shouldProcess selon besoin
# Workflow 1 - Traite uniquement les texte_original vides (Actuel)
# Workflow 2 - Traite uniquement les texte_auto: true
# Workflow 3 - Réécrit (textes auto : true) ET les texte_original vides, (texte_auto: false) sont protégés
# Workflow 4 — Traite uniquement si texte_auto est absent
name: Réécrire textes auto et manquants

on:
 workflow_dispatch:

jobs:
 enrich:
   runs-on: ubuntu-latest
   steps:
     - name: Réécrire via Claude
       run: |
         node << 'EOF'
         const https = require('https');

         const GH_PAT = process.env.GH_PAT;
         const ANTHROPIC_KEY = process.env.ANTHROPIC_API_KEY;
         const REPO = 'yunimes/circuits';

         function sleep(ms) {
           return new Promise(resolve => setTimeout(resolve, ms));
         }

         function ghRequest(method, path, body) {
           return new Promise((resolve, reject) => {
             const data = body ? JSON.stringify(body) : null;
             const options = {
               hostname: 'api.github.com',
               path,
               method,
               headers: {
                 'Authorization': 'Bearer ' + GH_PAT,
                 'Accept': 'application/vnd.github.v3+json',
                 'User-Agent': 'circuits-workflow',
                 ...(data && { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) })
               }
             };
             const req = https.request(options, res => {
               let raw = '';
               res.on('data', d => raw += d);
               res.on('end', () => resolve(JSON.parse(raw)));
             });
             req.on('error', reject);
             if (data) req.write(data);
             req.end();
           });
         }

         function claudeRequest(nom, source) {
           return new Promise((resolve, reject) => {
             const existing = Array.isArray(source) ? source.join('\n') : source;

             const systemPrompt = [
               '당신의 역할은 그 주제에 대해 완벽하게 이해하고 싶어하는 호기심 많고 교양있는 성인들과 지식을 공유하는 열정적인 역사가이자 가이드이면서 강단에 선 강사.',
               '애니메이터도 아니고, 어린이 교육자도 아니고, 정중한 음성 레지스터에서 정확하고 밀도 있게 말하는 전문 가이드.',
               '당신의 글쓰기 원칙:',
               '- 핵심어나 메모를 받으면, 단순히 나열하거나 요약하지 않습니다',
               '- 각 개념, 사건, 인물이 등장하면 반드시 깊이 파고듭니다 — 왜 그런가? 어떤 맥락인가? 어떤 의미인가?',
               '- 역사적 개념은 먼저 설명하고, 그 다음 구체적 사례를 연결합니다',
               '- 인과 사슬 : 결과를 진술하는 것이 아니라 과정을 전개한다. 각 단계는 다음 단계를 생성. 과정 없이는 결코 결과가 없다.',
               '- 짧은 문장과 긴 문장을 리드미컬하게 섞습니다',
               '- 필요하면 소제목으로 섹션을 나눕니다',
               '- 길이는 내용의 복잡성에 따라 자연스럽게 결정됩니다 — 단순한 주제는 짧게, 복잡한 주제는 충분히 깊게',
               '- 반드시 한국어로 작성합니다',
               '- 정보를 담지 않는 전환 문장이나 도입 문장을 쓰지 않습니다. 모든 문장은 직접적인 정보를 담아야 합니다',
               '- 사실, 원인, 결과 또는 정의를 전달하지 않는 모든 문장을 삭제합니다',
               '- 절대 금지 문장 유형 :',
               '  ..는 우연이 아니다',
               '  예고 : 오늘 제가 여러분께 드리고 싶은 핵심은 이거예요',
               '  분위기 조성 : 직접 보시면 바로 이해가 되실 텐데',
               '  무의미한 연결 : 자 이제 들어가 볼게요 / 정말 흥미로운 이야기가 있어요',
               '  대신 결단하는 표현 : 이것이 바로 이 장소가 특별한 이유입니다 / 역사의 아이러니예요',
               '- JSON 텍스트 안에 큰따옴표를 절대 사용하지 않습니다. 작은따옴표나 다른 표현으로 대체합니다',
               '- 불확실하거나 확인되지 않은 정보는 반드시 표시합니다',
               '응답은 반드시 유효한 JSON만: {"texte_original": "..."}'
             ].join('\n');

             const userPrompt = '장소명: "' + nom + '"\n\n핵심 메모:\n' + existing + '\n\n위 메모를 바탕으로 이 장소에 대한 깊이 있는 해설 텍스트를 작성하세요. 메모의 각 항목을 단순히 확장하는 것이 아니라, 역사적 맥락, 건축적 의미, 인물의 이야기, 시대적 배경 등을 유기적으로 엮어 방문객이 이 장소를 진정으로 이해할 수 있도록 해주세요.';

             const body = JSON.stringify({
               model: 'claude-sonnet-4-6',
               max_tokens: 8000,
               system: systemPrompt,
               messages: [{ role: 'user', content: userPrompt }]
             });

             const options = {
               hostname: 'api.anthropic.com',
               path: '/v1/messages',
               method: 'POST',
               headers: {
                 'x-api-key': ANTHROPIC_KEY,
                 'anthropic-version': '2023-06-01',
                 'Content-Type': 'application/json',
                 'Content-Length': Buffer.byteLength(body)
               }
             };

             const req = https.request(options, res => {
               let raw = '';
               res.on('data', d => raw += d);
               res.on('end', () => {
                 try {
                   const parsed = JSON.parse(raw);
                   if (parsed.error) throw new Error('Claude API error: ' + JSON.stringify(parsed.error));
                   const text = parsed.content.map(b => b.text || '').join('').trim();
                   const clean = text.replace(/```json|```/g, '').trim();
                   try {
                     resolve(JSON.parse(clean));
                   } catch(e) {
                     const match = clean.match(/"texte_original"\s*:\s*"([\s\S]*?)"\s*\}/);
                     if (match) {
                       resolve({ texte_original: match[1].replace(/\\n/g, '\n') });
                     } else {
                       const fallback = clean.replace(/^\{"texte_original"\s*:\s*"/, '').replace(/"\s*\}$/, '');
                       resolve({ texte_original: fallback });
                     }
                   }
                 } catch(e) {
                   console.error('Erreur parsing Claude:', raw.substring(0, 300));
                   reject(e);
                 }
               });
             });
             req.on('error', reject);
             req.write(body);
             req.end();
           });
         }

         function hasContent(val) {
           return Array.isArray(val) ? val.length > 0 : (typeof val === 'string' && val.trim().length > 0);
         }

         function getSource(obj) {
           return hasContent(obj.aide_memoire) ? obj.aide_memoire : obj.lignes;
         }

         function getNom(obj) {
           return obj.nom || obj.titre || obj.id || '?';
         }

         // Workflow 1 - Traite uniquement les texte_original vides 
         function shouldProcess(obj) {
           const hasSource = hasContent(obj.aide_memoire) || hasContent(obj.lignes);
           const hasTarget = hasContent(obj.texte_original);
           return hasSource && !hasTarget;
         }
         
         // Workflow 2 - Traite uniquement les texte_auto: true
         // function shouldProcess(obj) {
         //   const hasSource = hasContent(obj.aide_memoire) || hasContent(obj.lignes);
         //   return hasSource && obj.texte_auto === true;
         // }

         // Workflow 3 - Traite texte_original vide OU texte_auto: true
         // Protège les textes avec texte_auto: false (écrits manuellement)
         // function shouldProcess(obj) {
         //   const hasSource = hasContent(obj.aide_memoire) || hasContent(obj.lignes);
         //   const hasTarget = hasContent(obj.texte_original);
         //   return hasSource && (!hasTarget || obj.texte_auto === true);
         // }

         // Workflow 4 - Traite UNIQUEMENT si texte_auto est absent
         // function shouldProcess(obj) {
         //   const hasSource = hasContent(obj.aide_memoire) || hasContent(obj.lignes);           
         //   return hasSource && obj.texte_auto === undefined;
         // }


         async function processPoint(point) {
           if (!shouldProcess(point)) return false;
           console.log('  -> Reecriture de "' + getNom(point) + '"...');
           const result = await claudeRequest(getNom(point), getSource(point));
           point.texte_original = result.texte_original;
           point.texte_auto = true;
           await sleep(3000);
           return true;
         }

         async function processFile(folder, fileName) {
           console.log('\nTraitement de ' + folder + '/' + fileName + '...');
           const jsonFile = await ghRequest('GET', '/repos/' + REPO + '/contents/data/' + folder + '/' + fileName);
           const jsonData = JSON.parse(Buffer.from(jsonFile.content, 'base64').toString('utf8'));

           let modified = false;

           // Structure A : boucle.points tableau (ex: nimes.json)
           if (jsonData.boucle && Array.isArray(jsonData.boucle.points)) {
             for (const point of jsonData.boucle.points) {
               if (await processPoint(point)) modified = true;
             }
           }
           // Structure B : points tableau direct (ex: avignon.json)
           else if (Array.isArray(jsonData.points)) {
             for (const point of jsonData.points) {
               if (await processPoint(point)) modified = true;
             }
           }
           // Structure C : points objet unique
           else if (jsonData.points && !Array.isArray(jsonData.points)) {
             if (await processPoint(jsonData.points)) modified = true;
           }
           // Structure D : fichier plat (recits)
           else if (shouldProcess(jsonData)) {
             if (await processPoint(jsonData)) modified = true;
           }

           if (modified) {
             const newContent = Buffer.from(JSON.stringify(jsonData, null, 2), 'utf8').toString('base64');
             await ghRequest('PUT', '/repos/' + REPO + '/contents/data/' + folder + '/' + fileName, {
               message: 'Reecriture texte_original pour ' + fileName,
               content: newContent,
               sha: jsonFile.sha
             });
             console.log('  ok ' + fileName + ' sauvegarde');
           } else {
             console.log('  -> ' + fileName + ' — rien a faire');
           }
         }

         async function processFolder(folder) {
           console.log('\n=== Dossier : ' + folder + ' ===');
           const files = await ghRequest('GET', '/repos/' + REPO + '/contents/data/' + folder);
           const jsonFiles = files.filter(f => f.name.endsWith('.json')).map(f => f.name);
           console.log(jsonFiles.length + ' fichiers JSON trouves.');
           for (const fileName of jsonFiles) {
             await processFile(folder, fileName);
             await sleep(2000);
           }
         }

         async function main() {
           await processFolder('sites');
           await processFolder('recits');
           await processFolder('parcours');
           console.log('\n ok Tout est termine.');
         }

         main().catch(e => { console.error(e.message); process.exit(1); });
         EOF
       env:
         GH_PAT: ${{ secrets.GH_PAT }}
         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
