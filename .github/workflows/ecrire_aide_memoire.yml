name: Générer aide_memoire et texte_original en coréen (sources françaises)

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Générer via Claude
        run: |
          node << 'EOF'
          const https = require('https');

          const GH_PAT = process.env.GH_PAT;
          const ANTHROPIC_KEY = process.env.ANTHROPIC_API_KEY;
          const REPO = 'yunimes/circuits';

          function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
          }

          function ghRequest(method, path, body) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : null;
              const options = {
                hostname: 'api.github.com',
                path,
                method,
                headers: {
                  'Authorization': 'Bearer ' + GH_PAT,
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'circuits-workflow',
                  ...(data && { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) })
                }
              };
              const req = https.request(options, res => {
                let raw = '';
                res.on('data', d => raw += d);
                res.on('end', () => resolve(JSON.parse(raw)));
              });
              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          function claudeRequest(nom, notesFr) {
            return new Promise((resolve, reject) => {
              const source = Array.isArray(notesFr) ? notesFr.join('\n') : notesFr;

              const systemPrompt = [
                '당신의 역할은 포르투갈 역사·문화·건축에 정통한 전문 역사가이자 현장 가이드.',
                '대상 청중 : 지적 호기심이 강하고 교양 있는 한국인 성인 여행객.',
                '음성 레지스터 : 정확하고 밀도 있게, 정중하게. 애니메이터도 어린이 교육자도 아님.',
                '',
                '핵심 원칙:',
                '- 당신 자신의 지식을 근거로 씁니다. 제공된 메모는 다루어야 할 주제의 방향을 잡는 데만 씁니다.',
                '- 메모에 없더라도 이 장소를 이해하는 데 필수적인 역사적·건축적·문화적 맥락을 추가합니다.',
                '- 각 개념, 사건, 인물이 등장하면 반드시 깊이 파고듭니다 — 왜? 어떤 맥락? 어떤 의미?',
                '- 인과 사슬 : 결과를 진술하는 것이 아니라 과정을 전개한다. 과정 없이는 결코 결과가 없다.',
                '- 짧은 문장과 긴 문장을 리드미컬하게 섞습니다.',
                '- 필요하면 소제목으로 섹션을 나눕니다.',
                '- 정보를 담지 않는 전환·도입 문장을 쓰지 않습니다. 모든 문장은 직접적인 정보를 담아야 합니다.',
                '- 불확실하거나 확인되지 않은 정보는 반드시 표시합니다.',
                '- JSON 텍스트 안에 큰따옴표를 절대 사용하지 않습니다. 작은따옴표나 다른 표현으로 대체합니다.',
                '',
                '출력 형식 — 반드시 유효한 JSON만:',
                '{"texte_original": "...", "aide_memoire": ["...", "..."]}'
              ].join('\n');

              const userPrompt = [
                '장소명: "' + nom + '"',
                '위치: 포르투갈',
                '',
                '--- 참고 메모 (최소한 다루어야 할 주제 방향) ---',
                source,
                '---',
                '',
                '작업 순서:',
                '',
                '1. texte_original 먼저 작성.',
                '   이 장소에 대한 깊이 있는 한국어 해설 텍스트.',
                '   역사적 배경, 건축적 특징, 핵심 인물, 시대적 맥락을 유기적으로 엮어',
                '   방문객이 이 장소를 진정으로 이해할 수 있게 합니다.',
                '   길이는 내용의 복잡성에 따라 자연스럽게 결정합니다.',
                '',
                '2. aide_memoire는 texte_original에서 추출.',
                '   가이드가 현장에서 빠르게 참조할 핵심 사실만 간결한 불릿 5~8개로.',
                '   각 불릿은 한두 문장 이내. 날짜, 수치, 인명, 결정적 사실 위주.',
                '',
                '응답은 반드시 유효한 JSON만:',
                '{"texte_original": "...", "aide_memoire": ["...", "...", ...]}'
              ].join('\n');

              const body = JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 8000,
                system: systemPrompt,
                messages: [{ role: 'user', content: userPrompt }]
              });

              const options = {
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': ANTHROPIC_KEY,
                  'anthropic-version': '2023-06-01',
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, res => {
                const chunks = [];
                res.on('data', d => chunks.push(Buffer.isBuffer(d) ? d : Buffer.from(d)));
                res.on('end', () => {
                  const raw = Buffer.concat(chunks).toString('utf8');
                  try {
                    const parsed = JSON.parse(raw);
                    if (parsed.error) throw new Error('Claude API error: ' + JSON.stringify(parsed.error));
                    const text = parsed.content.map(b => b.text || '').join('').trim();
                    const clean = text.replace(/```json|```/g, '').trim();
                    resolve(JSON.parse(clean));
                  } catch(e) {
                    console.error('Erreur parsing Claude:', raw.substring(0, 300));
                    reject(e);
                  }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function hasContent(val) {
            return Array.isArray(val) ? val.length > 0 : (typeof val === 'string' && val.trim().length > 0);
          }

          function getNom(obj) {
            return obj.nom || obj.titre || obj.id || '?';
          }

          // Traite uniquement les points avec aide_memoire non vide ET texte_original vide
          function shouldProcess(point) {
            return hasContent(point.aide_memoire) && !hasContent(point.texte_original);
          }

          async function processPoint(point) {
            if (!shouldProcess(point)) return false;
            const nom = getNom(point);
            console.log('  -> Génération pour "' + nom + '"...');
            const result = await claudeRequest(nom, point.aide_memoire);
            point.aide_memoire = result.aide_memoire;
            point.texte_original = result.texte_original;
            point.texte_auto = true;
            await sleep(3000);
            return true;
          }

          async function processFile(fileName) {
            console.log('\nTraitement de sites/' + fileName + '...');
            const jsonFile = await ghRequest('GET', '/repos/' + REPO + '/contents/data/sites/' + fileName);
            const jsonData = JSON.parse(Buffer.from(jsonFile.content, 'base64').toString('utf8'));

            // Ne traite que les fichiers marqués langue_source: "fr"
            if (jsonData.langue_source !== 'fr') {
              console.log('  -> Ignoré (pas langue_source: fr)');
              return;
            }

            let modified = false;
            const points = jsonData.boucle ? jsonData.boucle.points : jsonData.points;

            if (Array.isArray(points)) {
              for (const point of points) {
                if (await processPoint(point)) modified = true;
              }
            }

            if (modified) {
              // Marquer le fichier comme traité
              jsonData.langue_source = 'ko';
              const newContent = Buffer.from(JSON.stringify(jsonData, null, 2), 'utf8').toString('base64');
              await ghRequest('PUT', '/repos/' + REPO + '/contents/data/sites/' + fileName, {
                message: 'Génération aide_memoire + texte_original (ko) pour ' + fileName,
                content: newContent,
                sha: jsonFile.sha
              });
              console.log('  ok ' + fileName + ' sauvegardé');
            } else {
              console.log('  -> ' + fileName + ' — rien à faire');
            }
          }

          async function main() {
            console.log('=== Génération aide_memoire + texte_original en coréen ===');
            const files = await ghRequest('GET', '/repos/' + REPO + '/contents/data/sites');
            const jsonFiles = files.filter(f => f.name.endsWith('.json')).map(f => f.name);
            console.log(jsonFiles.length + ' fichiers JSON trouvés.');
            for (const fileName of jsonFiles) {
              await processFile(fileName);
              await sleep(2000);
            }
            console.log('\n ok Tout est terminé.');
          }

          main().catch(e => { console.error(e.message); process.exit(1); });
          EOF
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
