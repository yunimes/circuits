name: Enrichir textes depuis aide-memoire et recits

on:
 workflow_dispatch:

jobs:
 enrich:
   runs-on: ubuntu-latest
   steps:
     - name: Enrichir via Claude
       run: |
         node << 'EOF'
         const https = require('https');

         const GH_PAT = process.env.GH_PAT;
         const ANTHROPIC_KEY = process.env.ANTHROPIC_API_KEY;
         const REPO = 'yunimes/circuits';

         function sleep(ms) {
           return new Promise(resolve => setTimeout(resolve, ms));
         }

         function ghRequest(method, path, body) {
           return new Promise((resolve, reject) => {
             const data = body ? JSON.stringify(body) : null;
             const options = {
               hostname: 'api.github.com',
               path,
               method,
               headers: {
                 'Authorization': `Bearer ${GH_PAT}`,
                 'Accept': 'application/vnd.github.v3+json',
                 'User-Agent': 'circuits-workflow',
                 ...(data && { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) })
               }
             };
             const req = https.request(options, res => {
               let raw = '';
               res.on('data', d => raw += d);
               res.on('end', () => resolve(JSON.parse(raw)));
             });
             req.on('error', reject);
             if (data) req.write(data);
             req.end();
           });
         }

         function claudeRequest(nom, source) {
           return new Promise((resolve, reject) => {
             const existing = Array.isArray(source)
               ? source.join('\n')
               : source;

             const body = JSON.stringify({
               model: 'claude-sonnet-4-6',
               max_tokens: 4000,
               system: 'Tu réponds UNIQUEMENT en JSON valide, sans backticks, sans préambule.',
               messages: [{
                 role: 'user',
                 content: `Tu es un guide culturel et pédagogique expert.\n\nVoici les points clés sur "${nom}" :\n\n${existing}\n\nRédige un texte enrichi et pédagogique sur ce sujet en t'appuyant sur ces points clés. Le texte doit :\n- Être rédigé EXACTEMENT dans la même langue que les points clés ci-dessus\n- Développer et contextualiser chaque point\n- Être fluide et agréable à lire\n- Apporter de la profondeur historique, culturelle ou pratique\n- Faire entre 200 et 400 mots\n\nRéponds UNIQUEMENT avec ce JSON :\n{"texte_original": "..."}`
               }]
             });

             const options = {
               hostname: 'api.anthropic.com',
               path: '/v1/messages',
               method: 'POST',
               headers: {
                 'x-api-key': ANTHROPIC_KEY,
                 'anthropic-version': '2023-06-01',
                 'Content-Type': 'application/json',
                 'Content-Length': Buffer.byteLength(body)
               }
             };

             const req = https.request(options, res => {
               let raw = '';
               res.on('data', d => raw += d);
               res.on('end', () => {
                 try {
                   const parsed = JSON.parse(raw);
                   if (parsed.error) throw new Error(`Claude API error: ${JSON.stringify(parsed.error)}`);
                   const text = parsed.content.map(b => b.text || '').join('').trim();
                   const clean = text.replace(/```json|```/g, '').trim();
                   resolve(JSON.parse(clean));
                 } catch(e) {
                   console.error('Erreur parsing Claude:', raw.substring(0, 300));
                   reject(e);
                 }
               });
             });
             req.on('error', reject);
             req.write(body);
             req.end();
           });
         }

         function hasContent(val) {
           return Array.isArray(val) ? val.length > 0 : (typeof val === 'string' && val.trim().length > 0);
         }

         function needsEnrichment(obj) {
           const hasSource = hasContent(obj.aide_memoire) || hasContent(obj.lignes);
           const hasTarget = hasContent(obj.texte_original);
           return hasSource && !hasTarget;
         }

         function getSource(obj) {
           return hasContent(obj.aide_memoire) ? obj.aide_memoire : obj.lignes;
         }

         function getNom(obj) {
           return obj.nom || obj.titre || obj.id || '?';
         }

         async function processFile(folder, fileName) {
           console.log(`\nTraitement de ${folder}/${fileName}...`);
           const jsonFile = await ghRequest('GET', `/repos/${REPO}/contents/data/${folder}/${fileName}`);
           const jsonData = JSON.parse(Buffer.from(jsonFile.content, 'base64').toString('utf8'));

           let modified = false;

           // Structure avec boucle.points (tableau) — dossier sites
           if (jsonData.boucle && Array.isArray(jsonData.boucle.points)) {
             for (const point of jsonData.boucle.points) {
               if (needsEnrichment(point)) {
                 console.log(`  → Enrichissement de "${getNom(point)}"...`);
                 const result = await claudeRequest(getNom(point), getSource(point));
                 point.texte_original = result.texte_original;
                 modified = true;
                 await sleep(3000);
               }
             }
           }
           // Structure avec points direct — dossier sites
           else if (jsonData.points && needsEnrichment(jsonData.points)) {
             console.log(`  → Enrichissement de "${getNom(jsonData.points)}"...`);
             const result = await claudeRequest(getNom(jsonData.points), getSource(jsonData.points));
             jsonData.points.texte_original = result.texte_original;
             modified = true;
           }
           // Structure plate — dossier recits
           else if (needsEnrichment(jsonData)) {
             console.log(`  → Enrichissement de "${getNom(jsonData)}"...`);
             const result = await claudeRequest(getNom(jsonData), getSource(jsonData));
             jsonData.texte_original = result.texte_original;
             modified = true;
           }

           if (modified) {
             const newContent = Buffer.from(JSON.stringify(jsonData, null, 2)).toString('base64');
             await ghRequest('PUT', `/repos/${REPO}/contents/data/${folder}/${fileName}`, {
               message: `Enrichissement texte_original pour ${fileName}`,
               content: newContent,
               sha: jsonFile.sha
             });
             console.log(`  ✓ ${fileName} sauvegardé`);
           } else {
             console.log(`  ↩ ${fileName} — rien à enrichir`);
           }
         }

         async function processFolder(folder) {
           console.log(`\n=== Dossier : ${folder} ===`);
           const files = await ghRequest('GET', `/repos/${REPO}/contents/data/${folder}`);
           const jsonFiles = files.filter(f => f.name.endsWith('.json')).map(f => f.name);
           console.log(`${jsonFiles.length} fichiers JSON trouvés.`);

           for (const fileName of jsonFiles) {
             await processFile(folder, fileName);
             await sleep(2000);
           }
         }

         async function main() {
           await processFolder('sites');
           await processFolder('recits');
           console.log('\n✓ Tout est terminé.');
         }

         main().catch(e => { console.error(e.message); process.exit(1); });
         EOF
       env:
         GH_PAT: ${{ secrets.GH_PAT }}
         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
