<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Circuits</title>
<link rel="stylesheet" href="style.css">
<style>
  .accueil-head { padding: 20px 4px 18px; }
  .accueil-titre { font-size: 24px; font-weight: 800; color: var(--terra); }
  .accueil-sous { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

  .circuit-btn { display: flex; align-items: center; gap: 14px; padding: 16px 14px; background: var(--card); border: 1px solid var(--card-line); border-left: 4px solid var(--terra); border-radius: 11px; margin-bottom: 10px; text-decoration: none; color: var(--ink); }
  .circuit-btn:active { background: #F6F1E8; }
  .circuit-emoji { font-size: 28px; min-width: 36px; text-align: center; }
  .circuit-info { flex: 1; }
  .circuit-titre { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .circuit-sous { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
  .circuit-arrow { color: var(--ink-faint); font-size: 18px; }
</style>
</head>
<body>
<div id="app">Chargement…</div>

<script>
async function loadJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`Introuvable: ${path}`);
  return res.json();
}

(async function () {
  try {
    const circuits = await loadJSON('data/circuits.json');
    const liste = circuits.map(c => `
      <a class="circuit-btn" href="index.html?c=${c.id}">
        <div class="circuit-emoji">${c.emoji}</div>
        <div class="circuit-info">
          <div class="circuit-titre">${c.titre}</div>
          <div class="circuit-sous">${c.sous_titre}</div>
        </div>
        <div class="circuit-arrow">›</div>
      </a>`).join('');

    document.getElementById('app').innerHTML = `
      <div class="accueil-head">
        <div class="accueil-titre">🗺️ Mes circuits</div>
        <div class="accueil-sous">Sélectionner un circuit</div>
      </div>
      ${liste}
    `;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div style="padding:20px;color:#A33B2E">Erreur: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
